name: HACS Validation

on:
  push:
    branches: [master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          # Skipped checks — repo-level configuration the action can't fix:
          #   brands  → needs an icon PR to home-assistant/brands
          ignore: brands
